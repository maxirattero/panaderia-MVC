name: Backup Database

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install postgresql-client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Dump database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          FILENAME="backup_$(date +%Y-%m-%d).sql.gz"
          pg_dump "$DATABASE_URL" | gzip > "$FILENAME"
          echo "FILENAME=$FILENAME" >> "$GITHUB_ENV"

      - name: Checkout backups repo
        uses: actions/checkout@v4
        with:
          repository: maxirattero/masaviva-backups
          token: ${{ secrets.BACKUP_REPO_TOKEN }}
          path: backups-repo

      - name: Copy and commit backup
        run: |
          cp "$FILENAME" backups-repo/
          cd backups-repo
          git config user.name "backup-bot"
          git config user.email "backup-bot@users.noreply.github.com"
          git add "$FILENAME"
          git commit -m "Backup $(date +%Y-%m-%d)"
          find . -maxdepth 1 -name "backup_*.sql.gz" -mtime +30 -delete
          git add -A
          git commit -m "Cleanup old backups" --allow-empty
          git push
